matrix:
  include:
    - os: linux
      dist: trusty
      sudo: required
      services:
      - docker
      env:
        - MINIKUBE_MEMORY=7777
        - MINIKUBE_CPU=4
        - MINIKUBE_DRIVER=none
        - HELM_INSTALL_DIR=$HOME/.local/bin
        - NVM_DIR="$HOME/.nvm"
        - CHANGE_MINIKUBE_NONE_USER=true
        - MINIKUBE_VERSION=v0.25.2
        - KUBE_VERSION=v1.9.4
      cache: npm
      cache: pip
      cache:
        directories:
        - $HOME/.local/bin
        - /usr/local
          #- .git
          #- $HOME/.kube
          #- $HOME/.minikube

language: node_js
node_js:
  - "8"
#language: python
#python:
    #- "3.6"

addons:
  apt:
    packages:
      - curl
      - rsync
      - socat
      - time
      - devscripts
      - ansible
      - parallel
      - golang
      - nmap
      - python-pip
      - rlwrap

before_install:
- pip install --user jinja2-cli
- curl https://raw.githubusercontent.com/helm/helm/master/scripts/get|bash &> /dev/null
- npm i -g yaml2json
- ln -s $(pwd) /home/travis/.kubash
- make bats
- make ct
- if [[ ! -e "$HOME/.local/bin/nsenter" ]]; then .ci/ubuntu-compile-nsenter.sh && sudo cp .tmp/util-linux-2.30.2/nsenter $HOME/.local/bin; fi

before_script:
# Download kubectl, which is a requirement for using minikube.
# Download minikube.
- curl -Lo kubectl https://storage.googleapis.com/kubernetes-release/release/$KUBE_VERSION/bin/linux/amd64/kubectl && chmod +x kubectl && sudo mv kubectl /usr/local/bin/
- curl -Lo minikube https://storage.googleapis.com/minikube/releases/$MINIKUBE_VERSION/minikube-linux-amd64 && chmod +x minikube && sudo mv minikube /usr/local/bin/
- sudo minikube start --vm-driver=none --kubernetes-version=$KUBE_VERSION
# Fix the kubectl context, as it's often stale.
- minikube update-context
# Wait for Kubernetes to be up and ready.
- JSONPATH='{range .items[*]}{@.metadata.name}:{range @.status.conditions[*]}{@.type}={@.status};{end}{end}'; until kubectl get nodes -o jsonpath="$JSONPATH" 2>&1 | grep -q "Ready=True"; do sleep 1; done
#- ls -alh /home/travis
#- ls -alh /home/travis/.kubash
#- ls -alh /home/travis/.kubash/bin
#- export PATH=/home/travis/.local/bin:$PATH
#- echo "export PATH=/home/travis/.local/bin:$PATH" >> /home/travis/.bashrc
#- echo $PATH
#- make -e helm
- bash scripts/dotfiles
- bash scripts/chkdirs
- sudo chown $USER /var/lib
- /bin/bash -l -c "/usr/bin/time -v make -e ci"
- env
- pwd
- mkdir -p clusters/default
- cp $HOME/.kube/config clusters/default/
#- make -e jinja2
- which jinja2

