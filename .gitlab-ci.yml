stages:
  - bootstrap
  - build
  - test 
  - deploy 

build_job:
  stage: bootstrap
  allow_failure: true
  script:
    - whoami
    - echo 'build'
    - bash -l .ci/ex.sh
    - curl -sL git.io/kubash > /tmp/kubash
    - chmod +x /tmp/kubash
    - yes y | /tmp/kubash
    - bash -l .ci/builder.sh

fulltest-bootstrap:
  stage: bootstrap
  tags:
    - fulltest
  only:
    - fulltest
  except:
    - merge_requests
  allow_failure: true
  script:
    - echo 'fulltest1bootstrap'
    - bash -l .ci/ex.sh
    - cd $HOME/.kubash && git pull && echo '/home/packer_cache/' > .packer_cache_path && cd pax && ./update_packer_cache 
    - curl -sL git.io/kubash > /tmp/kubash
    - chmod +x /tmp/kubash
    - yes y | /tmp/kubash

fulltest-ubuild1.15:
  stage: build
  tags:
    - fulltest
  only:
    - fulltest
  except:
    - merge_requests
  allow_failure: false
  script:
    - bash -l .ci/ubuilder ubuntu1.15.0

fulltest-ubuild1.14:
  stage: build
  tags:
    - fulltest
  only:
    - fulltest
  except:
    - merge_requests
  allow_failure: false
  script:
    - bash -l .ci/ubuilder ubuntu1.14.4 

fulltest-ubuild1.13:
  stage: build
  tags:
    - fulltest
  only:
    - fulltest
  except:
    - merge_requests
  allow_failure: false
  script:
    - .ci/ubuilder ubuntu1.13.8

fulltest-build:
  stage: build
  tags:
    - fulltest
  only:
    - fulltest
  except:
