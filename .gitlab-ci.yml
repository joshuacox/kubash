stages:
  - build
  - test 
  - deploy 

build_job:
  stage: build
  allow_failure: true
  script:
    - echo 'build'
    - curl -sL git.io/kubash > /tmp/kubash
    - chmod +x /tmp/kubash
    - bash -l .ci/builder.sh
    - yes y | /tmp/kubash

fulltest-build:
  stage: build
  tags:
    - fulltest
  only:
    - fulltest
  except:
    - merge_requests
  allow_failure: true
  script:
    - whoami
    - echo 'fulltest1build'
    - curl -sL git.io/kubash > /tmp/kubash
    - chmod +x /tmp/kubash
    - bash -l .ci/builder.sh
    - yes y | /tmp/kubash

rspec:
  stage: test
  script:
    - echo 'rspec'

fulltest-test:
  stage: test
  tags:
    - fulltest
  only:
    - fulltest
  except:
    - merge_requests
  script:
    - whoami
    - echo 'fulltest1'
    - bash -l .ci/tester.sh

fulltest-deploy:
  stage: deploy
  tags:
    - fulltest
  only:
    - fulltest
  except:
    - merge_requests
  script:
    - echo 'fulltest1deploy'
    - ls
    - pwd

deploy_job:
  stage: deploy
  script:
    - echo 'deploy'
