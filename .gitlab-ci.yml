fulltest-test:
  stage: test
  tags:
    - fulltest
  only:
    - fulltest
  except:
    - merge_requests
  script:
    - echo 'fulltest1'
    - bash -l .ci/tester.sh

fulltest-deploy:
  stage: deploy
  tags:
    - fulltest
  only:
    - fulltest
  except:
    - merge_requests
  script:
    - echo 'fulltest1deploy'
    - ls
    - pwd

deploy_job:
  stage: deploy
  script:
    - echo 'deploy'
