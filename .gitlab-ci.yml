default:
  image: ubuntu:bionic

stages:
  - bootstrap
  - build
  - test 
  - deploy 

build_job:
  stage: bootstrap
  allow_failure: false
  only:
    - fulltest
  variables:
    GIT_SUBMODULE_STRATEGY: recursive
  before_script:
    - export PATH="/root/.nvm/versions/node/v10.16.0/bin:/root/.local/bin:/root/.kubash/bin:$PATH"
    - printenv
    - cp -av $PWD /root/.kubash 
      # - apt-get update; apt-get install -y git
      # - THIS_CWD=$(pwd) cd /root && git clone --recursive https://github.com/kubash/kubash.git .kubash && cd /root/.kubash && git checkout --track fulltest && cd $THIS_PWD
  script:
    - whoami
    - printenv
    - mkdir -p /root/.kubash/bin 
    - mkdir -p /root/.local/bin 
    - echo $PATH
    - echo 'build'
    - bash -l .ci/ex.sh
    - ./bootstrap -y
      #    - bash -l .ci/builder.sh

fulltest-bootstrap:
  stage: bootstrap
  tags:
    - fulltest
  only:
    - fulltest
  except:
    - merge_requests
  allow_failure: false
  variables:
    GIT_SUBMODULE_STRATEGY: recursive
  before_script:
    - export PATH="/home/gitlab-runner/.nvm/versions/node/v10.16.0/bin:/home/gitlab-runner/.local/bin:/home/gitlab-runner/.kubash/bin:$PATH"
  script:
    - echo 'fulltest1bootstrap'
    - printenv
    - bash -l .ci/ex.sh
    - ./bootstrap -y
    - cd $HOME/.kubash && git pull && echo '/home/packer_cache/' > .packer_cache_path && cd pax && ./update_packer_cache 
      #- curl -sL git.io/kubash > /tmp/kubash
      #- chmod +x /tmp/kubash

